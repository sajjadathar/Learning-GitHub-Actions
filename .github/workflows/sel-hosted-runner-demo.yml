name: self-hosted-runner-demo
on:
  push:
    branches: 
      - dev

jobs:
  demo-1:
    name: Demo Job 1
    runs-on: ubuntu-latest # pick github hosted runner with label "ubuntu-latest"
    steps:
        - name: Display System Info
          run: |
            echo "Hostname: $(hostname)"
            echo "OS version: "
            lsb_release -a || cat /etc/os-release
            echo "Runner Name: ${{ runner.name }}"
            echo "Runner OS: ${{ runner.os }}"
  demo-2:
    name: Demo Job 2
    runs-on: self-hosted # pick self-hosted runner with label "self-hosted"
    steps:
        - name: Display System Info
          run: |
            echo "Hostname: $(hostname)"
            echo "OS version: "
            lsb_release -a || cat /etc/os-release
            echo "Runner Name: ${{ runner.name }}"
            echo "Runner OS: ${{ runner.os }}"

            
    