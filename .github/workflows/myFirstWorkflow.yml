name: my-first-workflow
# To get trigger on every push in this repo in any branch
on:
  push:
    branches: 
      - dev
      - 'feature-*'
      - main

jobs:
  job1:  
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: step-2 - checkout
        uses: actions/checkout@v6.0.3
      - name: step-3
        run: |
          echo 'pwd' >> myartifact.txt
          mkdir artifacts
          echo 'ls -ltr' >> artifacts/list.txt
          echo 'hostname' >> artifacts/hostname.txt
      - name: upload single file
        uses: actions/upload-artifact@v7.0.1
        with:
          name: single_file
          path: ./myartifact.txt
  job2:  
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: checking current directory
        run: |
          pwd
          ls -ltr
      - name: download single file
        uses: actions/download-artifact@v8.0.0
        with:
          name: single_file
      - name: checking current directory post download
        run: |
          pwd
          ls -ltr
