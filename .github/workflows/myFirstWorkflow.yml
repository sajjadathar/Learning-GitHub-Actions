name: CI Pipeline
# To get trigger on every push in this repo in main branch
on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
  security-events: write
  packages: write
  actions: read

jobs:
  ci-pipeline-job:

    uses: sajjadathar/reusable-workflows/.github/workflows/ci-pipeline.yml@main

    with:
      run_codeql: true
      run_sonarqube: true
      run_build: true
      run_publish-ghcr: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  defploy-with-kubectl:
    environment: STAGING
    env:
      NAMESPACE: ${{ vars.NAMESPACE }}

    needs: ci-pipeline-job
    runs-on: github-actions-scaleset-demo
    steps:
      - name: Checkout code Reository
        uses: actions/checkout@v6.0.3
      - name: Install kubectl
        run: |
          curl --proto '=https' --tlsv1.2 -LO "https://dl.k8s.io/release/$(curl --proto '=https' --tlsv1.2 -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl version
          kubectl get nodes
      - name: Install yq
        run: |
          sudo curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Update Image name in deployment.yml
        run: |
          export IMAGE="ghcr.io/${{ github.repository_owner }}/github-actions-fastapi-app:${{ needs.ci-pipeline-job.outputs.image-tag }}"
          yq e '.spec.template.spec.containers[0].image = strenv(IMAGE)' manifests/deployment.yml -i
          cat manifests/deployment.yml

      - name: Create Namespace if not exist
        run: |
          kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE
      - name: Deploy to Kubernetes Cluster
        run: |
          kubectl apply -f manifests/ -n $NAMESPACE
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/sajjadathar-app -n $NAMESPACE
          kubectl get all -n $NAMESPACE
          