name: my-first-workflow
# To get trigger on every push in this repo in any branch
on:
  push:


jobs:
  job1:  
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: step-1
        run: |
          pwd
          ls -ltr
          hostname
      - name: step-2 - checkout
        uses: actions/checkout@v6.0.3
      - name: step-3
        run: |
          echo 'pwd' >> myartifact.txt 
          ls -ltr
          hostname
      - name: upload single file
        uses: actions/upload-artifact@v7.0.1
        with:
          name: single-file
          path: ./myartifact.txt
          
            
        
        
