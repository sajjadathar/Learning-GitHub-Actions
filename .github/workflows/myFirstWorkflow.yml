name: CI Pipeline
# To get trigger on every push in this repo in any branch
on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-pipeline-job:
    uses: sajjadathar/reusable-workflows/.github/workflows/ci-pipeline.yml@main
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
