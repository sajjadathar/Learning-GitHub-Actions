name: my-first-workflow
# To get trigger on every push in this repo in any branch
on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Running Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.3
      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with: 
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@eb1897b8dc4b5d5bfe39a428a8f2304605e0983c    # v7.0.0
      
      - name: Install Dependencies
        run: uv sync --frozen --no-build
      - name: Run Unit Test
        run: |
          mkdir -p reports/
          uv run --frozen pytest --junitxml=reports/unit-tests-results.xml --cov=. --cov-report=xml:reports/coverage.xml --cov-report=term-missing -v
      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@v7.0.0
        with: 
          name: unit-test-report
          path: reports/

  codeql:
      name: CodeQL Security Scan
      runs-on: ubuntu-latest
      permissions:
        actions: read
        contents: read
        security-events: write
      strategy:
        matrix:
          language: ['python']
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: Initialize CodeQL
          uses: github/codeql-action/init@v4
          with:
           language: ${{ matrix.language }}
        - name: Perform CodeQL Analysis
          uses: github/codeql-action/analyze@v4
          with: 
            strategy: "security"

  sonarqube: 
    name: SonarQube
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download Coverage Report
        uses: actions/download-artifact@v7.0.0
        with:
          name: unit-test-report
          path: reports/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
      
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}