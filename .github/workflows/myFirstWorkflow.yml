name: my-first-workflow
# To get trigger on every push in this repo in any branch
on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Running Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6.0.3
      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with: 
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v7.0.0
      
      - name: Install Dependencies
        run: uv sync
      - name: Run Unit Test
        run: uv run pytest -v

          
